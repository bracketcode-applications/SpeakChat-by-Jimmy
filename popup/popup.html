<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TNG SpeakChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body class="dark-mode">
    <div class="container">
        <header>
            <h1 class="gradient-text">
                <svg class="icon-svg" style="fill: var(--tango-pink); width: 20px; height: 20px;" viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
                TNG SpeakChat
            </h1>
        </header>

        <div class="card">
            <div class="form-group">
                <label>Voz:</label>
                <select id="voice" class="styled-select"></select>
            </div>

            <div class="form-group">
                <label>Velocidad:</label>
                <div style="display: flex; align-items: center;">
                    <input type="range" id="rate" min="0.5" max="2" step="0.1" class="slider-input">
                    <span id="rateValue" class="slider-value">1</span>
                </div>
            </div>

            <div class="form-group">
                <label>Tono:</label>
                <div style="display: flex; align-items: center;">
                    <input type="range" id="pitch" min="0" max="2" step="0.1" class="slider-input">
                    <span id="pitchValue" class="slider-value">1</span>
                </div>
            </div>
        </div>

        <div class="actions-grid">
            <button id="testVoice" class="btn-primary">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="white" style="width: 16px; height: 16px;">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                Probar voz
            </button>

            <button id="toggle" class="btn-secondary">
                <svg class="icon-svg" viewBox="0 0 24 24" style="width: 16px; height: 16px;">
                    <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
                </svg>
                Activado
            </button>

            <button id="openOptions" class="btn-secondary">
                <svg class="icon-svg" viewBox="0 0 24 24" style="width: 16px; height: 16px;">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
                Utilidades
            </button>
        </div>
        
        <div class="status-message"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
